<!DOCTYPE html>
<html>
<head>
<title>Milkman Coloring</title>
<style>
body{text-align:center;font-family:Arial;background:#f5f5f5}
button,input{font-size:18px;margin:5px;padding:8px}
#box{position:relative;display:inline-block;max-width:100%}
#paintCanvas,#lineArt{
  position:absolute;
  left:0;
  top:0;
}
#lineArt{pointer-events:none}
</style>
</head>
<body>

<h1>Milkman Coloring Page</h1>

<input type="color" id="color" value="#ff0000">
<input type="range" id="size" min="5" max="80" value="30">
<button id="undo">Undo</button>
<button id="clear">Clear</button>

<div id="box">
  <canvas id="paintCanvas"></canvas>
  <img id="lineArt" src="milkman.png">
</div>

<script>
const img=document.getElementById("lineArt");
const canvas=document.getElementById("paintCanvas");
const ctx=canvas.getContext("2d");
const color=document.getElementById("color");
const size=document.getElementById("size");
let drawing=false;
let history=[];

img.onload=function(){
  canvas.width=img.naturalWidth;
  canvas.height=img.naturalHeight;
  canvas.style.width="100%";
  canvas.style.height="auto";
  img.style.width="100%";
  img.style.height="auto";
  document.getElementById("box").style.width=img.naturalWidth+"px";
};

function save(){
  history.push(canvas.toDataURL());
}

function pos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {
    x:(t.clientX-r.left)*(canvas.width/r.width),
    y:(t.clientY-r.top)*(canvas.height/r.height)
  };
}

function start(e){
  save();
  drawing=true;
  const p=pos(e);
  ctx.beginPath();
  ctx.moveTo(p.x,p.y);
  e.preventDefault();
}

function draw(e){
  if(!drawing)return;
  const p=pos(e);
  ctx.globalAlpha=0.5;
  ctx.strokeStyle=color.value;
  ctx.lineWidth=size.value;
  ctx.lineCap="round";
  ctx.lineJoin="round";
  ctx.lineTo(p.x,p.y);
  ctx.stroke();
  e.preventDefault();
}

function stop(){
  drawing=false;
}

document.getElementById("undo").onclick=function(){
  if(history.length===0)return;
  const old=history.pop();
  const im=new Image();
  im.onload=function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(im,0,0);
  };
  im.src=old;
};

document.getElementById("clear").onclick=function(){
  save();
  ctx.clearRect(0,0,canvas.width,canvas.height);
};

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",draw);
canvas.addEventListener("mouseup",stop);
canvas.addEventListener("mouseleave",stop);
canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",draw);
canvas.addEventListener("touchend",stop);
</script>

</body>
</html>
