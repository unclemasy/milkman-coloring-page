<!DOCTYPE html>
<html>
<head>
<title>Milkman Coloring Page</title>
<style>
body{font-family:Arial;text-align:center;background:#f5f5f5}
button,input{font-size:18px;margin:5px;padding:8px}
#box{position:relative;display:inline-block;background:white}
canvas{position:absolute;left:0;top:0}
#lineCanvas{pointer-events:none}
#sourceImg{display:none}
</style>
</head>

<body>

<h1>Milkman Coloring Page</h1>

<input type="color" id="color" value="#ff0000">
<input type="range" id="size" min="5" max="80" value="30">
<button id="undo">Undo</button>
<button id="clear">Clear</button>

<div id="box">
  <canvas id="paintCanvas"></canvas>
  <canvas id="lineCanvas"></canvas>
</div>

<img id="sourceImg" src="milkman.png">

<script>
const img=document.getElementById("sourceImg");
const box=document.getElementById("box");
const paint=document.getElementById("paintCanvas");
const line=document.getElementById("lineCanvas");
const pctx=paint.getContext("2d");
const lctx=line.getContext("2d");
const color=document.getElementById("color");
const size=document.getElementById("size");

let drawing=false;
let history=[];

img.onload=function(){
  const w=img.naturalWidth;
  const h=img.naturalHeight;

  box.style.width=w+"px";
  box.style.height=h+"px";

  paint.width=line.width=w;
  paint.height=line.height=h;

  lctx.drawImage(img,0,0,w,h);

  const imageData=lctx.getImageData(0,0,w,h);
  const data=imageData.data;

  for(let i=0;i<data.length;i+=4){
    const r=data[i], g=data[i+1], b=data[i+2];
    const brightness=(r+g+b)/3;

    if(brightness>220){
      data[i+3]=0;
    } else {
      data[i]=0;
      data[i+1]=0;
      data[i+2]=0;
      data[i+3]=255;
    }
  }

  lctx.putImageData(imageData,0,0);
};

function save(){
  history.push(paint.toDataURL());
}

function getPos(e){
  const rect=paint.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{
    x:(t.clientX-rect.left)*(paint.width/rect.width),
    y:(t.clientY-rect.top)*(paint.height/rect.height)
  };
}

function start(e){
  save();
  drawing=true;
  const p=getPos(e);
  pctx.beginPath();
  pctx.moveTo(p.x,p.y);
  e.preventDefault();
}

function draw(e){
  if(!drawing)return;
  const p=getPos(e);

  pctx.globalAlpha=0.5;
  pctx.strokeStyle=color.value;
  pctx.lineWidth=size.value;
  pctx.lineCap="round";
  pctx.lineJoin="round";

  pctx.lineTo(p.x,p.y);
  pctx.stroke();

  e.preventDefault();
}

function stop(){
  drawing=false;
}

document.getElementById("undo").onclick=function(){
  if(history.length===0)return;
  const old=history.pop();
  const im=new Image();
  im.onload=function(){
    pctx.clearRect(0,0,paint.width,paint.height);
    pctx.drawImage(im,0,0);
  };
  im.src=old;
};

document.getElementById("clear").onclick=function(){
  save();
  pctx.clearRect(0,0,paint.width,paint.height);
};

paint.addEventListener("mousedown",start);
paint.addEventListener("mousemove",draw);
paint.addEventListener("mouseup",stop);
paint.addEventListener("mouseleave",stop);

paint.addEventListener("touchstart",start);
paint.addEventListener("touchmove",draw);
paint.addEventListener("touchend",stop);
</script>

</body>
</html>
